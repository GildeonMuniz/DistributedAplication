version: "3.9"

networks:
  microservices:
    driver: bridge

volumes:
  sqlserver_data:
  rabbitmq_data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Senha@123"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Senha@123" -Q "SELECT 1" -C || exit 1
      interval: 15s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Senha@123
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      retries: 5
      start_period: 30s

  # ─── Services ──────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      USER_SERVICE_URL: http://user-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      JWT_SECRET: "change-me-in-production-use-32-chars-minimum"
      JWT_EXPIRATION_HOURS: "24"
    networks:
      - microservices
    depends_on:
      - user-service
      - order-service
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      PORT: "8081"
      DB_HOST: sqlserver
      DB_PORT: "1433"
      DB_USER: sa
      DB_PASSWORD: "Senha@123"
      DB_NAME: microservices
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: Senha@123
      JWT_SECRET: "change-me-in-production-use-32-chars-minimum"
    networks:
      - microservices
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      PORT: "8082"
      DB_HOST: sqlserver
      DB_PORT: "1433"
      DB_USER: sa
      DB_PASSWORD: "Senha@123"
      DB_NAME: microservices
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: Senha@123
    networks:
      - microservices
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: Senha@123
    networks:
      - microservices
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
